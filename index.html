<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEE 2.1 Exam Dashboard</title>
    <style>
        :root {
            --lightning: #00d4ff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), 
                        url('./varsity-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header h1 { 
            margin-top: 40px; 
            font-size: 2.2rem; 
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--lightning);
            font-weight: 800;
        }
        
        /* Container pushed further down to create space for hammer */
        .wheel-container {
            position: relative;
            width: 350px; height: 350px;
            margin-top: 180px; /* Increased margin to create space for big hammer above circle */
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 768px) {
            .wheel-container { width: 450px; height: 450px; margin-top: 220px; }
        }

        .wheel {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .segment {
            position: absolute;
            width: 50%; height: 50%;
            transform-origin: 100% 100%;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .s1 { background: linear-gradient(45deg, #ff5f6d, #ffc371); transform: rotate(0deg) skewY(-18deg); }
        .s2 { background: linear-gradient(45deg, #f1c40f, #f39c12); transform: rotate(72deg) skewY(-18deg); }
        .s3 { background: linear-gradient(45deg, #11998e, #38ef7d); transform: rotate(144deg) skewY(-18deg); }
        .s4 { background: linear-gradient(45deg, #00c6ff, #0072ff); transform: rotate(216deg) skewY(-18deg); }
        .s5 { background: linear-gradient(45deg, #8e44ad, #c39bd3); transform: rotate(288deg) skewY(-18deg); }

        .segment span {
            transform: skewY(18deg) rotate(-45deg);
            position: absolute;
            font-weight: 900;
            width: 80px;
            right: 20px; top: 45px;
            font-size: 0.9rem;
        }

        /* --- BIG Hammer positioned in the gap --- */
        .hammer-box {
            position: absolute;
            top: -120px; /* Positioned above the circle center */
            width: 280px; /* Big Size */
            height: 280px;
            z-index: 25;
            pointer-events: none; /* Allows clicking segments through it */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 768px) {
            .hammer-box { width: 350px; height: 350px; top: -150px; }
        }

        .hammer-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--lightning));
            animation: lighting-strike 0.15s infinite alternate, hammer-hover 3s ease-in-out infinite;
        }

        /* Continuous Lighting & Hover Animation */
        @keyframes lighting-strike {
            0% { filter: drop-shadow(0 0 10px var(--lightning)) brightness(1.1); }
            100% { filter: drop-shadow(0 0 30px #fff) brightness(1.4); }
        }

        @keyframes hammer-hover {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .routine-btn {
            position: absolute;
            width: 80px; height: 80px;
            background: #fff; color: #000;
            border-radius: 50%; border: 4px solid #000;
            cursor: pointer; font-weight: 900;
            z-index: 30;
            font-size: 0.7rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .info-card {
            width: 85%; max-width: 480px;
            padding: 20px; border-radius: 20px;
            backdrop-filter: blur(20px);
            text-align: center; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            margin-bottom: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5);
        }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .drive-btn { display: block; padding: 15px; background: #fff; color: #000; text-decoration: none; border-radius: 30px; font-weight: 800; margin-top: 10px; }

        .footer { margin-top: auto; padding: 20px; text-align: center; background: rgba(0,0,0,0.8); width: 100%; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>AUST EEE 2/1 EXAM PORTAL</h1>
    </div>

    <div class="wheel-container">
        <div class="wheel" id="wheelFrame">
            <div class="segment s1" onclick="loadCourse(0)"><span>EEE-2105</span></div>
            <div class="segment s2" onclick="loadCourse(1)"><span>EEE-2103</span></div>
            <div class="segment s3" onclick="loadCourse(2)"><span>MATH-2103</span></div>
            <div class="segment s4" onclick="loadCourse(3)"><span>ME-2151</span></div>
            <div class="segment s5" onclick="loadCourse(4)"><span>HUM-2109</span></div>
        </div>

        <div class="hammer-box">
            <img src="thor-hammer.png" alt="Mjolnir" class="hammer-img">
        </div>

        <button class="routine-btn" onclick="openRoutine()">VIEW<br>ROUTINE</button>
    </div>

    <div id="infoCard" class="info-card">
        <h2 id="title" style="margin:0; color: #f1c40f;">Subject</h2>
        <div class="details-grid">
            <div class="box"><small>📅 DATE</small><br><span id="dateText">-</span></div>
            <div class="box"><small>🕒 TIME</small><br><span id="timeText">-</span></div>
            <div class="box"><small>🗓 DAY</small><br><span id="dayText">-</span></div>
            <div class="box"><small>📍 VENUE</small><br><span>AUST Campus</span></div>
        </div>
        <a id="driveBtn" href="#" target="_blank" class="drive-btn">📂 MATERIALS DRIVE</a>
    </div>

    <div class="footer">Developed by: <b>Ratul Krishna Mojumder</b></div>

    <script>
        const courseData = [
            { name: "Electrical Machineries", code: "EEE-2105", date: "May 03, 2026", time: "09:30 AM-12:00 PM", day: "Sunday", link: "https://drive.google.com/drive/folders/1VpU2gqtwiapRvBhHxeXenZraFj9seVK1", color: "#ff5f6d" },
            { name: "Digital Circuit Design", code: "EEE-2103", date: "May 06, 2026", time: "09:30 AM-12:00 PM", day: "Wednesday", link: "https://drive.google.com/drive/folders/1rQV9WMWOJKGwlUjHBhig3fMik9SNFbIB", color: "#f1c40f" },
            { name: "Mathematics-IV", code: "MATH-2103", date: "May 11, 2026", time: "09:30 AM-12:00 PM", day: "Monday", link: "https://drive.google.com/drive/folders/1QpfegRbmSES0cPU5A2u8ThztCIDnbQhV", color: "#2ecc71" },
            { name: "Mechanical Eng.", code: "ME-2151", date: "May 17, 2026", time: "09:30 AM-12:00 PM", day: "Sunday", link: "https://drive.google.com/drive/folders/1lpebIYMXh4wugawWNpYKtkOnF-eMYO-0", color: "#00c6ff" },
            { name: "Technical English", code: "HUM-2109", date: "May 20, 2026", time: "09:30 AM-12:00 PM", day: "Wednesday", link: "https://drive.google.com/drive/folders/1pikfV-sZeGvZBv_RTFtm-aUmRC9VgvR7", color: "#8e44ad" }
        ];

        function loadCourse(id) {
            const course = courseData[id];
            document.getElementById('wheelFrame').style.transform = `rotate(${-id * 72}deg)`;
            const card = document.getElementById('infoCard');
            card.style.display = 'block';
            document.getElementById('title').innerText = course.name;
            document.getElementById('dateText').innerText = course.date;
            document.getElementById('timeText').innerText = course.time;
            document.getElementById('dayText').innerText = course.day;
            document.getElementById('driveBtn').href = course.link;
            card.style.borderColor = course.color;
        }

        function openRoutine() {
            alert("Check the Subject Card for details!");
        }
    </script>
</body>
</html>
